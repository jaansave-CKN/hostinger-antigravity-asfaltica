<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HSEQ GESTIÓN - Acceso Restringido</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = { darkMode: "class", theme: { extend: {
        "colors": { "background": "#f7f9ff", "primary": "#003f87", "primary-container": "#0056b3", "on-primary": "#ffffff",
          "surface-container-lowest": "#ffffff", "surface-container-low": "#f1f4f9", "on-surface": "#181c20",
          "on-surface-variant": "#424752", "outline-variant": "#c2c6d4", "error": "#ba1a1a", "error-container": "#ffdad6", "on-error-container": "#93000a" }
      } } }
    </script>
<style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }</style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-sm bg-surface-container-lowest border border-outline-variant rounded-xl p-lg">
<div class="w-14 h-14 mx-auto mb-md rounded-full bg-primary-container flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-3xl">lock</span>
</div>
<h1 class="text-xl font-bold text-center mb-1">Acceso Restringido</h1>
<p class="text-sm text-on-surface-variant text-center mb-6">Demo privada — HSEQ Gestión. Ingresa la clave que te compartieron.</p>
<form class="space-y-4" onsubmit="return submitGate(event)">
<input autofocus="" class="w-full px-4 py-3 rounded-lg bg-surface-container-low border border-outline-variant" id="gate-password" placeholder="Clave de acceso" type="password"/>
<button class="w-full py-3 rounded-lg bg-primary text-on-primary font-bold hover:bg-primary-container transition-colors" type="submit">Entrar</button>
</form>
<p class="hidden mt-4 text-sm text-error-container bg-error-container text-on-error-container rounded-lg p-3" id="gate-error">Clave incorrecta. Intenta de nuevo.</p>
</div>
<script>
    async function submitGate(e) {
      e.preventDefault();
      const password = document.getElementById('gate-password').value;
      const res = await fetch('/api/gate-login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password })
      });
      if (res.ok) {
        window.location.href = '/login.html';
      } else {
        document.getElementById('gate-error').classList.remove('hidden');
      }
      return false;
    }
  </script>
</body></html>
